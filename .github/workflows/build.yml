name: Build Usina Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install dependencies
      run: npm install
      
    - name: Build Tauri App
      run: npm run tauri build
      
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: usina-overlay-windows
        path: src-tauri/target/release/usina-overlay.exe
